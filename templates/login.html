<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>შესვლა — კვების ოპტიმიზატორი</title>
  <style>
    :root{--bg:#0d0f14;--surface:#161a23;--surface2:#1e2433;--border:#2a3347;
          --accent:#4ade80;--accent2:#22d3ee;--text:#e8edf5;--muted:#6b7a99;--red:#f87171}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
          padding:40px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    h1{font-size:1.6rem;font-weight:700;
       background:linear-gradient(90deg,var(--accent),var(--accent2));
       -webkit-background-clip:text;-webkit-text-fill-color:transparent;
       background-clip:text;margin-bottom:6px;text-align:center}
    .sub{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:28px}
    .flash{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);
           border-radius:10px;padding:12px 14px;color:var(--red);font-size:.85rem;margin-bottom:18px}
    label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;letter-spacing:.5px}
    input[type=email],input[type=password]{
      width:100%;background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:11px 14px;color:var(--text);font-size:.95rem;
      transition:border-color .2s;margin-bottom:16px}
    input:focus{outline:none;border-color:var(--accent)}
    .btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:.95rem;
         font-weight:700;cursor:pointer;transition:all .15s;
         background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
         box-shadow:0 4px 20px rgba(34,197,94,.3)}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(34,197,94,.4)}
    .footer-link{text-align:center;margin-top:20px;font-size:.83rem;color:var(--muted)}
    .footer-link a{color:var(--accent);text-decoration:none}
    .footer-link a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="card">
  <h1>🥗 კვების ოპტიმიზატორი</h1>
  <p class="sub">შედი შენს ანგარიშში</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}{% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <label>Email</label>
    <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
    <label>პაროლი</label>
    <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
    <button type="submit" class="btn">შესვლა</button>
  </form>

  <p class="footer-link">ანგარიში არ გაქვს? <a href="{{ url_for('auth.register') }}">დარეგისტრირდი</a></p>
</div>
</body>
</html>
