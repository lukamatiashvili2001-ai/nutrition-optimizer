services:
  - type: web
    name: nutrition-optimizer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nutrition-db
          property: connectionString

databases:
  - name: nutrition-db
    plan: free
